anaconda_config_version: 1
upstream_sources:
  - gitlab:
      identifier: poppler/poppler
      host: gitlab.freedesktop.org
      use_max_tag: true
      from_pattern: (?i)^poppler-(\d+(?:\.\d+)*)$
      to_pattern: \1
      exclude_regex: (?i)(?:^|[-._])(?:rc\d*|alpha\d*|beta\d*|pre\d+|preview|dev\d+)(?:[-._]|$)
    packages:
      - poppler
      - poppler-qt
